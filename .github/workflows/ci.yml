name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Check and test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript checks
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Validate sample JSON dataset
        run: npm run validate:sample:json

      - name: Validate sample CSV dataset
        run: npm run validate:sample:csv

      - name: Validate all example datasets
        run: npm run validate:examples

      - name: Convert sample CSV dataset to JSON
        run: npm run convert:sample
